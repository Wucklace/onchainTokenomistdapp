<svg
width="220"
height="220"
viewBox="0 0 220 220"
xmlns="http://www.w3.org/2000/svg"
style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);"
>

<!-- MASK DEFINITIONS -->
<defs>

  <!-- Outer chain hollow mask -->
  <mask id="outerHollow">
    <rect width="100%" height="100%" fill="white"/>
    <circle
      cx="110"
      cy="110"
      r="100"
      fill="none"
      stroke="black"
      stroke-width="6"
      stroke-dasharray="14 10"
      stroke-linecap="round"
    />
  </mask>

  <!-- Separator hollow mask -->
  <mask id="separatorHollow">
    <rect width="100%" height="100%" fill="white"/>

    <g stroke="black" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 6">
      <line x1="110" y1="110" x2="110" y2="20"/>
      <line x1="110" y1="110" x2="173" y2="47"/>
      <line x1="110" y1="110" x2="200" y2="110"/>
      <line x1="110" y1="110" x2="173" y2="173"/>
      <line x1="110" y1="110" x2="110" y2="200"/>
      <line x1="110" y1="110" x2="47" y2="173"/>
      <line x1="110" y1="110" x2="20" y2="110"/>
      <line x1="110" y1="110" x2="47" y2="47"/>
    </g>

  </mask>

</defs>

<!-- OUTER CHAIN -->
<circle
  cx="110"
  cy="110"
  r="100"
  fill="none"
  stroke="#15c6e6c0"
  stroke-width="12"
  stroke-dasharray="14 10"
  stroke-linecap="round"
  mask="url(#outerHollow)"
/>

<!-- TOKEN SEGMENTS -->
<g transform="translate(110,110)">

  <path d="M0 0 L0 -90 A90 90 0 0 1 63 -63 Z" fill="#15c6e6c0"/>
  <path d="M0 0 L63 -63 A90 90 0 0 1 90 0 Z" fill="#fa7e09cb"/>
  <path d="M0 0 L90 0 A90 90 0 0 1 63 63 Z" fill="rgba(21,198,230,0.15)"/>
  <path d="M0 0 L63 63 A90 90 0 0 1 0 90 Z" fill="rgba(250,126,9,0.09)"/>
  <path d="M0 0 L0 90 A90 90 0 0 1 -63 63 Z" fill="#15c6e6c0"/>
  <path d="M0 0 L-63 63 A90 90 0 0 1 -90 0 Z" fill="#fa7e09cb"/>
  <path d="M0 0 L-90 0 A90 90 0 0 1 -63 -63 Z" fill="rgba(21,198,230,0.15)"/>
  <path d="M0 0 L-63 -63 A90 90 0 0 1 0 -90 Z" fill="rgba(250,126,9,0.09)"/>

</g>

<!-- SEPARATORS -->
<g
  stroke="#15c6e6c0"
  stroke-width="8"
  stroke-linecap="round"
  stroke-dasharray="6 6"
  mask="url(#separatorHollow)"
>
  <line x1="110" y1="110" x2="110" y2="20"/>
  <line x1="110" y1="110" x2="173" y2="47"/>
  <line x1="110" y1="110" x2="200" y2="110"/>
  <line x1="110" y1="110" x2="173" y2="173"/>
  <line x1="110" y1="110" x2="110" y2="200"/>
  <line x1="110" y1="110" x2="47" y2="173"/>
  <line x1="110" y1="110" x2="20" y2="110"/>
  <line x1="110" y1="110" x2="47" y2="47"/>
</g>

<!-- CENTER GOVERNANCE NODE -->
<circle cx="110" cy="110" r="10" fill="#15c6e6c0"/>
<circle cx="110" cy="110" r="18" fill="none" stroke="#15c6e6c0" opacity="0.4"/>

</svg>